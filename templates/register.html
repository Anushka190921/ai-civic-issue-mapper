<html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Registration</title>

    <!-- Bootstrap CSS for responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: whitesmoke;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .gov-header {
            background-color: rgb(59, 59, 139);
            color: white;
            padding: 12px 15px;
            text-align: center;
            font-weight: bold;
        }

        .gov-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 450px;
            border-radius: 10px;
        }

        .form-control, .btn {
            border-radius: 6px;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 6px;
        }

        .google-btn img {
            width: 20px;
            margin-right: 8px;
        }

        @media (max-width: 576px) {
            .gov-header h3 {
                font-size: 16px;
            }

            .card {
                max-width: 95vw;
                padding: 20px !important;
            }

            h4 {
                font-size: 18px;
            }

            .btn {
                font-size: 14px;
                padding: 10px;
            }

            .form-control, .form-select {
                font-size: 16px;
                padding: 10px;
            }

            .form-label {
                font-size: 14px;
                margin-bottom: 6px;
            }

            .text-center a {
                display: inline-block;
                margin-top: 10px;
                font-size: 14px;
            }

            .google-btn {
                font-size: 13px !important;
            }
        }

        @media (max-width: 400px) {
            .gov-header {
                padding: 10px 8px;
            }

            .gov-header h3 {
                font-size: 14px;
            }

            .card {
                padding: 15px !important;
            }

            h4 {
                font-size: 16px;
                margin-bottom: 15px !important;
            }

            .form-label {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- Government style header -->
    <div class="gov-header">
        <marquee behavior="alternate" direction="left">
            <h3>Civic Issue Reporting Portal</h3>
        </marquee>
    </div>

    <div class="container">
        <!-- Registration Card -->
        <div class="card shadow p-4">
            <h4 class="mb-3 text-center">Citizen Registration</h4>

            <!-- Registration Form -->
            <form method="POST">
                <!-- First Name -->
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" class="form-control" placeholder="Joe" name="first_name" required>
                </div>

                <!-- Last Name -->
                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" class="form-control" placeholder="Biden" name="last_name" required>
                </div>

                <!-- Gmail Validation -->
                <div class="mb-3">
                    <label class="form-label">Email (Gmail only)</label>
                    <input type="email"
                           class="form-control"
                           placeholder="akd@gmail.com"
                           name="email"
                           pattern="^[a-zA-Z0-9._%+-]+@gmail\.com$"
                           title="Please enter a valid Gmail address"
                           required>
                </div>

                <!-- Password Validation -->
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password"
                           class="form-control"
                           name="password"
                           pattern="^(?=.*[!@#$%^&*]).{8,}$"
                           title="Password must be at least 8 characters and contain one special character"
                           required>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100">
                    Register
                </button>

                <!-- Google sign-in button -->
                <div class="text-center mt-3">
                    <a href="/google_login" class="btn btn-light border w-100 google-btn">
                        <img src="https://developers.google.com/identity/images/g-logo.png" width="20" style="margin-right:8px;">
                        Register with Google
                    </a>
                </div>
            </form>

            <p class="text-center mt-3 mb-0">
                Already registered? <a href="/login">login</a>
            </p>
        </div>
    </div>

</body>
</html>
