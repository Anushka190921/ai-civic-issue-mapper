<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Civic Issue</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .header {
            background-color: #0d6efd;
            color: white;
            padding: 15px;
            font-size: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-title {
            flex: 1;
            min-width: 200px;
        }

        .top-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .top-buttons .btn {
            font-size: 13px;
            padding: 6px 12px;
            white-space: nowrap;
        }

        .card {
            border-radius: 10px;
        }

        .form-control, .form-select, .btn {
            border-radius: 6px;
        }

        .container {
            padding: 15px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .card {
                padding: 20px !important;
            }

            h3 {
                font-size: 20px;
            }

            .header {
                font-size: 18px;
                padding: 12px;
                flex-direction: column;
                align-items: flex-start;
            }

            .header-title {
                width: 100%;
            }

            .top-buttons {
                width: 100%;
            }

            .top-buttons .btn {
                flex: 1;
                min-width: 120px;
            }

            .form-control, .form-select {
                font-size: 16px;
                padding: 10px;
            }

            label {
                font-size: 14px;
                margin-bottom: 6px;
            }

            textarea {
                min-height: 100px;
            }

            .btn {
                font-size: 14px;
                padding: 10px;
            }
        }

        @media (max-width: 500px) {
            .container {
                padding: 8px;
                margin-top: 15px !important;
            }

            .card {
                padding: 15px !important;
                box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075) !important;
            }

            h3 {
                font-size: 18px;
                margin-bottom: 15px !important;
            }

            .header {
                font-size: 16px;
                padding: 10px;
            }

            .top-buttons .btn {
                font-size: 12px;
                padding: 8px 10px;
                min-width: 100px;
            }

            .form-control, .form-select {
                font-size: 15px;
            }

            label {
                font-size: 13px;
            }

            textarea {
                min-height: 80px;
            }
        }

        @media (max-width: 360px) {
            .header {
                font-size: 14px;
            }

            .top-buttons {
                gap: 5px;
            }

            .top-buttons .btn {
                font-size: 11px;
                padding: 6px 8px;
            }

            .card {
                padding: 12px !important;
            }

            h3 {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-title">Civic Issue Reporting Portal</div>
    <div class="top-buttons">
        <a href="/my_issues" class="btn btn-light btn-sm">My Complaints</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</div>

<!-- Form Container -->
<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="mb-3">Report an Issue</h3>

        <form method="POST" action="/submit" enctype="multipart/form-data">

            <!-- Issue Type -->
            <div class="mb-3">
                <label>Issue Type</label>
                <select name="issue_type" class="form-control" required>
                    <option value="">Select Issue</option>
                    <option>Garbage</option>
                    <option>Pothole</option>
                    <option>Water Leakage</option>
                    <option>Street Light</option>
                    <option>Drainage</option>
                </select>
            </div>

            <!-- Description -->
            <div class="mb-3">
                <label>Description</label>
                <textarea name="description" class="form-control" required></textarea>
            </div>

            <!-- Location -->
            <div class="mb-3">
                <label>Location</label><br>
                <button type="button" class="btn btn-secondary btn-sm" onclick="getLocation()">Get Location</button>
                <p id="locationText" class="mt-2 text-success"></p>

                <input type="hidden" name="latitude" id="latitude">
                <input type="hidden" name="longitude" id="longitude">
            </div>

            <!-- Image Upload -->
            <div class="mb-3">
                <label>Upload Image</label>
                <input type="file" name="image" class="form-control">
            </div>

            <!-- Submit -->
            <button type="submit" class="btn btn-primary w-100">Submit Issue</button>

        </form>
    </div>
</div>

<!-- Location Script -->
<script>
function getLocation() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            document.getElementById("latitude").value = position.coords.latitude;
            document.getElementById("longitude").value = position.coords.longitude;
            document.getElementById("locationText").innerHTML = "Location captured successfully!";
        });
    } else {
        alert("Geolocation is not supported by this browser.");
    }
}
</script>

</body>
</html>
