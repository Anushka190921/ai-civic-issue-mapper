<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
 
    <!-- Bootstrap CSS for responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            background-color: whitesmoke;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
 
        .gov-header {
            background-color: rgb(59, 59, 139);
            color: white;
            padding: 12px 15px;
            text-align: center;
            font-weight: bold;
        }
 
        .gov-header h3 {
            margin: 0;
            font-size: 18px;
        }
 
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .card {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }
 
        .form-control, .btn {
            border-radius: 6px;
        }
 
        .helper-text {
            font-size: 14px;
            color: #555;
        }
 
        @media (max-width: 576px) {
            .gov-header h3 {
                font-size: 16px;
            }
 
            .card {
                max-width: 95vw;
                padding: 20px !important;
            }
 
            h4 {
                font-size: 18px;
            }
 
            .btn {
                font-size: 14px;
                padding: 10px;
            }
 
            .form-control {
                font-size: 16px;
                padding: 10px;
            }
 
            label {
                font-size: 14px;
                margin-bottom: 6px;
            }
 
            .text-center a {
                display: inline-block;
                margin-top: 10px;
                font-size: 14px;
            }
        }
 
        @media (max-width: 400px) {
            .gov-header {
                padding: 10px 8px;
            }
 
            .gov-header h3 {
                font-size: 14px;
            }
 
            .card {
                padding: 15px !important;
            }
 
            h4 {
                font-size: 16px;
                margin-bottom: 15px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Government style header -->
    <div class="gov-header">
        <marquee behavior="alternate" direction="left">
            <h3>Civic Issue Reporting Portal</h3>
        </marquee>
    </div>
 
    <div class="container">
        <!-- Forgot Password Card -->
        <div class="card shadow p-4">
            <h4 class="mb-3 text-center">Forgot Password</h4>
            <p class="helper-text text-center mb-3">Enter the email linked to your account and we'll send you a link to reset your password.</p>
 
            <!-- Success message after submitting -->
            {% if message %}
                <div class="alert alert-success py-2" role="alert">
                    {{ message }}
                </div>
            {% endif %}
 
            <!-- Error message -->
            {% if error %}
                <div class="alert alert-danger py-2" role="alert">
                    {{ error }}
                </div>
            {% endif %}
 
            {% if not message %}
            <!-- Forgot Password Form -->
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" placeholder="akd@gmail.com" name="email" required>
                </div>
 
                <button type="submit" class="btn btn-primary w-100">
                    Send Reset Link
                </button>
            </form>
            {% endif %}
 
            <p class="text-center mt-3 mb-0">
                Remembered your password? <a href="/login">Back to Login</a>
            </p>
        </div>
    </div>
 
</body>
</html>
