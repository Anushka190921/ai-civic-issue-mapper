<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Civic Issue Mapper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0B2545; --navy-deep:#081B34; --paper:#EDEFE8; --ink:#10151B;
    --amber:#F2A93B; --amber-ink:#5C3A08; --steel:#3E6C99; --green:#3E9B6F; --line: rgba(237,239,232,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0; min-height:100vh; background:var(--navy); color:var(--paper); font-family:'IBM Plex Sans', sans-serif; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; animation-iteration-count:1 !important;} }
  h1{font-family:'Archivo Expanded', sans-serif; text-transform:uppercase; margin:0;}
  a{color:inherit;}
  :focus-visible{outline:3px solid var(--amber); outline-offset:2px;}

  .glow{position:absolute; inset:0; pointer-events:none; z-index:0; background:radial-gradient(560px 380px at 20% 25%, rgba(62,108,153,.20), transparent 60%), radial-gradient(500px 360px at 85% 75%, rgba(242,169,59,.10), transparent 60%);}

  .panel{
    position:relative; z-index:1; width:100%; max-width:400px; margin:20px; background:var(--navy-deep);
    border:1px solid var(--line); border-radius:14px; padding:40px 36px; box-shadow:0 24px 60px rgba(0,0,0,.45);
    opacity:0; transform:scale(.6) translateY(24px); animation:pop-in .65s cubic-bezier(.34,1.56,.64,1) forwards;
  }
  @keyframes pop-in{ to{opacity:1; transform:scale(1) translateY(0);} }

  .brand{display:flex; align-items:center; gap:9px; font-family:'Archivo Expanded', sans-serif; font-weight:800; font-size:15px; letter-spacing:.03em; text-decoration:none; margin-bottom:26px; justify-content:center;}
  .dot-ring{position:relative; width:11px; height:11px;}
  .dot-ring::before{content:''; position:absolute; inset:0; border-radius:50%; background:var(--amber); box-shadow:0 0 8px rgba(242,169,59,.8); animation:pulse-dot 1.8s ease-in-out infinite;}
  @keyframes pulse-dot{ 0%,100%{transform:scale(1); opacity:1;} 50%{transform:scale(1.5); opacity:.5;} }

  .eyebrow{font-family:'IBM Plex Mono', monospace; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--steel); display:block; text-align:center; margin-bottom:8px;}
  h1{font-size:22px; text-align:center; margin-bottom:8px;}
  .sub{color:rgba(237,239,232,.65); font-size:13.5px; text-align:center; margin-bottom:26px; line-height:1.5;}

  .message-box{background:rgba(62,157,111,.14); border:1.5px solid rgba(62,157,111,.4); color:#9fe6bf; border-radius:6px; padding:14px 16px; font-size:13.5px; text-align:center; margin-bottom:6px;}

  label{display:block; font-size:11.5px; font-family:'IBM Plex Mono', monospace; letter-spacing:.06em; text-transform:uppercase; color:rgba(237,239,232,.55); margin-bottom:6px;}
  .field{margin-bottom:20px;}
  input[type=email]{width:100%; padding:12px 14px; border-radius:5px; border:1.5px solid rgba(237,239,232,.2); background:rgba(237,239,232,.06); color:var(--paper); font-family:'IBM Plex Sans', sans-serif; font-size:14px;}
  input::placeholder{color:rgba(237,239,232,.35);}
  input:focus{border-color:var(--steel); outline:none; background:rgba(237,239,232,.1);}

  .btn-primary{width:100%; padding:13px; border-radius:5px; border:none; cursor:pointer; font-weight:700; font-size:14.5px; background:var(--amber); color:var(--amber-ink); transition:transform .2s ease, background .2s ease;}
  .btn-primary:hover{background:#f5b957; transform:translateY(-2px);}

  .back-link{display:block; text-align:center; margin-top:22px; font-size:12.5px; color:var(--steel); text-decoration:none; font-weight:600;}
  .back-link:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="glow"></div>

<div class="panel">
  <a href="/" class="brand"><span class="dot-ring"></span>CIVIC / MAPPER</a>
  <span class="eyebrow">Account recovery</span>
  <h1>Forgot your password?</h1>
  <p class="sub">Enter the email on your account and we'll send you a link to reset it.</p>

  {% if message %}
    <div class="message-box">{{ message }}</div>
  {% else %}
    <form action="/forgot_password" method="POST">
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn-primary">Send reset link</button>
    </form>
  {% endif %}

  <a href="/login" class="back-link">&larr; Back to log in</a>
</div>

</body>
</html>
