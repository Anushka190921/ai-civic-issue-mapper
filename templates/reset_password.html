<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
 
    <!-- Bootstrap CSS for responsive design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
 
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
 
        body {
            background-color: whitesmoke;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
 
        .gov-header {
            background-color: rgb(59, 59, 139);
            color: white;
            padding: 12px 15px;
            text-align: center;
            font-weight: bold;
        }
 
        .gov-header h3 {
            margin: 0;
            font-size: 18px;
        }
 
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        .card {
            width: 100%;
            max-width: 400px;
            border-radius: 10px;
        }
 
        .form-control, .btn {
            border-radius: 6px;
        }
 
        @media (max-width: 576px) {
            .gov-header h3 {
                font-size: 16px;
            }
 
            .card {
                max-width: 95vw;
                padding: 20px !important;
            }
 
            h4 {
                font-size: 18px;
            }
 
            .btn {
                font-size: 14px;
                padding: 10px;
            }
 
            .form-control {
                font-size: 16px;
                padding: 10px;
            }
 
            label {
                font-size: 14px;
                margin-bottom: 6px;
            }
 
            .text-center a {
                display: inline-block;
                margin-top: 10px;
                font-size: 14px;
            }
        }
 
        @media (max-width: 400px) {
            .gov-header {
                padding: 10px 8px;
            }
 
            .gov-header h3 {
                font-size: 14px;
            }
 
            .card {
                padding: 15px !important;
            }
 
            h4 {
                font-size: 16px;
                margin-bottom: 15px !important;
            }
        }
    </style>
</head>
<body>
    <!-- Government style header -->
    <div class="gov-header">
        <marquee behavior="alternate" direction="left">
            <h3>Civic Issue Reporting Portal</h3>
        </marquee>
    </div>
 
    <div class="container">
        <!-- Reset Password Card -->
        <div class="card shadow p-4">
            <h4 class="mb-3 text-center">Reset Password</h4>
 
            <!-- Error message -->
            {% if error %}
                <div class="alert alert-danger py-2" role="alert">
                    {{ error }}
                </div>
            {% endif %}
 
            {% if expired %}
                <!-- Link expired or invalid - no form, send them back to request a new one -->
                <p class="text-center mt-3 mb-0">
                    <a href="/forgot-password" class="btn btn-primary w-100">Request New Link</a>
                </p>
            {% else %}
                <!-- Reset Password Form -->
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">New Password</label>
                        <input type="password"
                               class="form-control"
                               name="password"
                               pattern="^(?=.*[!@#$%^&*]).{8,}$"
                               title="Password must be at least 8 characters and contain one special character"
                               required>
                    </div>
 
                    <div class="mb-3">
                        <label class="form-label">Confirm New Password</label>
                        <input type="password"
                               class="form-control"
                               name="confirm_password"
                               required>
                    </div>
 
                    <button type="submit" class="btn btn-primary w-100">
                        Reset Password
                    </button>
                </form>
            {% endif %}
 
            <p class="text-center mt-3 mb-0">
                <a href="/login">Back to Login</a>
            </p>
        </div>
    </div>
 
</body>
</html>
